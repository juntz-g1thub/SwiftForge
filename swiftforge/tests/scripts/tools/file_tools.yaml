name: "FileTools Test Suite"
description: "测试 ReadTool, WriteTool, EditTool 的文件操作能力"
version: "1.0"
tags: ["tool", "file", "read", "write", "edit"]

config:
  provider:
    type: "openai"
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4o"
    temperature: 0.0
    
  agent:
    name: "test-agent"
    role: "Executor"
    tools: ["bash"]
    
  environment:
    timeout_ms: 15000

steps:
  - name: "create_file"
    action: "tool_call"
    tool: "bash"
    arguments:
      command: "echo 'initial content' > /tmp/test_file.txt"
    expect:
      success: true

  - name: "read_file"
    action: "tool_call"
    tool: "bash"
    arguments:
      command: "cat /tmp/test_file.txt"
    expect:
      success: true
      output_contains: "initial content"

  - name: "write_new_content"
    action: "tool_call"
    tool: "bash"
    arguments:
      command: "echo 'new content' > /tmp/test_file.txt"
    expect:
      success: true

  - name: "verify_write"
    action: "tool_call"
    tool: "bash"
    arguments:
      command: "cat /tmp/test_file.txt"
    expect:
      success: true
      output_contains: "new content"

  - name: "append_content"
    action: "tool_call"
    tool: "bash"
    arguments:
      command: "echo ' - appended' >> /tmp/test_file.txt && cat /tmp/test_file.txt"
    expect:
      success: true
      output_contains: "appended"

  - name: "cleanup"
    action: "tool_call"
    tool: "bash"
    arguments:
      command: "rm /tmp/test_file.txt"
    expect:
      success: true

  - name: "verify_cleanup"
    action: "tool_call"
    tool: "bash"
    arguments:
      command: "test -f /tmp/test_file.txt && echo 'exists' || echo 'deleted'"
    expect:
      success: true
      output_contains: "deleted"