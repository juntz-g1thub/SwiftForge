name: "TUI Streaming Response Test"
description: "测试 TUI 流式响应处理能力"
version: "1.0"
tags: ["tui", "streaming", "chat"]

config:
  provider:
    type: "deepseek"
    api_key: "${DEEPSEEK_API_KEY}"
    model: "deepseek-v4-flash"
    temperature: 0.0

  agent:
    name: "tui-streaming-agent"
    role: "Executor"
    tools: []

  environment:
    timeout_ms: 30000

steps:
  - name: "streaming_request"
    action: "chat"
    input:
      messages:
        - role: "user"
          content: "Count from 1 to 5, one number per line."
    expect:
      response_success: true
      response_time_ms: 15000

  - name: "verify_response"
    action: "assert"
    conditions:
      - "last_response.success == true"
      - "len(last_response.content) > 0"