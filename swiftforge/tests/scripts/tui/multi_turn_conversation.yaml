name: "TUI Multi-Turn Conversation Test"
description: "测试 TUI 多轮对话能力 - 上下文记忆"
version: "1.0"
tags: ["tui", "chat", "multi-turn"]

config:
  provider:
    type: "deepseek"
    api_key: "${DEEPSEEK_API_KEY}"
    model: "deepseek-v4-flash"
    temperature: 0.0

  agent:
    name: "tui-chat-agent"
    role: "Executor"
    tools: ["bash"]

  environment:
    timeout_ms: 60000

steps:
  - name: "first_turn"
    action: "chat"
    input:
      messages:
        - role: "system"
          content: "You are a helpful assistant. Remember that the user likes cats."
        - role: "user"
          content: "What animal do I like?"
    expect:
      response_success: true
      response_contains: "cat"

  - name: "second_turn"
    action: "chat"
    input:
      messages:
        - role: "system"
          content: "You are a helpful assistant. Remember that the user likes cats."
        - role: "user"
          content: "What animal do I like?"
        - role: "assistant"
          content: "You like cats."
        - role: "user"
          content: "What is my favorite animal?"
    expect:
      response_success: true
      response_contains: "cat"

  - name: "verify_multi_turn"
    action: "assert"
    conditions:
      - "last_response.success == true"
      - "len(last_response.content) > 0"