name: "Agent Basic Chat Test"
description: "测试 Agent 与 OpenAI Provider 的基本对话功能"
version: "1.0"
tags: ["agent", "chat", "openai"]

config:
  provider:
    type: "openai"
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4o"
    temperature: 0.0
    
  agent:
    name: "test-agent"
    role: "Executor"
    tools: []
    
  environment:
    timeout_ms: 30000
    retry_count: 2

steps:
  - name: "simple_chat"
    action: "chat"
    input:
      messages:
        - role: "system"
          content: "You are a helpful assistant. Answer with only the number 4."
        - role: "user"
          content: "What is 2 + 2? Answer with just the number."
    expect:
      response_success: true
      response_contains: "4"
      response_time_ms: 10000

  - name: "verify_response"
    action: "assert"
    conditions:
      - "last_response.success == true"
      - "len(last_response.content) > 0"