name: "OpenAI Provider Chat Test"
description: "测试 OpenAI Provider 的基本聊天功能"
version: "1.0"
tags: ["provider", "openai", "chat"]

config:
  provider:
    type: "openai"
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4o"
    temperature: 0.0
    
  agent:
    name: "test-agent"
    role: "Executor"
    tools: []
    
  environment:
    timeout_ms: 30000

steps:
  - name: "simple_chat"
    action: "chat"
    input:
      messages:
        - role: "user"
          content: "Say 'hello' if you can hear me."
    expect:
      response_success: true
      response_contains: "hello"
      response_time_ms: 15000

  - name: "verify_response_not_empty"
    action: "assert"
    conditions:
      - "last_response.success == true"
      - "len(last_response.content) > 0"